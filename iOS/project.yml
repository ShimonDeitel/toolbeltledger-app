name: ToolbeltLedger
options:
  bundleIdPrefix: com.shimondeitel.toolbeltledger
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  ToolbeltLedger:
    type: application
    platform: iOS
    sources:
      - path: ToolbeltLedger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.toolbeltledger
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: ToolbeltLedger/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ToolbeltLedgerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ToolbeltLedgerTests
      - path: ToolbeltLedger.storekit
    dependencies:
      - target: ToolbeltLedger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.toolbeltledger.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ToolbeltLedgerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ToolbeltLedgerUITests
    dependencies:
      - target: ToolbeltLedger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.toolbeltledger.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  ToolbeltLedger:
    build:
      targets:
        ToolbeltLedger: all
        ToolbeltLedgerTests: [test]
        ToolbeltLedgerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: ToolbeltLedger.storekit
    test:
      config: Debug
      storeKitConfiguration: ToolbeltLedger.storekit
      targets:
        - ToolbeltLedgerTests
        - ToolbeltLedgerUITests
    archive:
      config: Release
